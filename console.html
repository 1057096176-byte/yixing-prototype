<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体检反馈管理控制台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* Top Nav */
    .topnav {
      background: #1b3a6e;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      color: white;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }
    .nav-spacer { flex: 1; }
    .nav-user {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #4a7fcf;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px;
    }

    /* Toggle pill top-left */
    .view-toggle {
      display: inline-flex;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      overflow: hidden;
    }
    .vt-btn {
      padding: 5px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    .vt-btn + .vt-btn { border-left: 1px solid rgba(255,255,255,0.35); }
    .vt-btn.active { background: rgba(255,255,255,0.18); color: white; font-weight: 600; }

    /* Page container */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .page-subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    /* Stats cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    @media (max-width: 700px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #1b3a6e;
    }
    .stat-value span {
      font-size: 14px;
      font-weight: 400;
      color: #aaa;
      margin-left: 2px;
    }
    .stat-trend {
      font-size: 12px;
      margin-top: 4px;
      color: #52c41a;
    }
    .stat-trend.down { color: #E53935; }

    /* Filter bar */
    .filter-bar {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .filter-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 160px;
    }
    .filter-label {
      font-size: 12px;
      color: #666;
    }
    .filter-select, .filter-input {
      height: 34px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      color: #333;
      background: white;
      outline: none;
      width: 100%;
    }
    .filter-select:focus, .filter-input:focus {
      border-color: #4361EE;
    }
    .filter-date-range {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-date-range .filter-input { width: 130px; }
    .date-sep { font-size: 13px; color: #aaa; }
    .filter-btn {
      height: 34px;
      padding: 0 20px;
      background: #1b3a6e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }
    .filter-btn:hover { background: #2a4f8a; }
    .filter-reset {
      height: 34px;
      padding: 0 16px;
      background: white;
      color: #666;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      align-self: flex-end;
    }

    /* Table card */
    .table-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .table-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #f0f0f0;
    }
    .table-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .table-total {
      font-size: 13px;
      color: #888;
    }
    .table-total em { color: #1b3a6e; font-style: normal; font-weight: 600; }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: #f7f8fa;
      padding: 10px 16px;
      font-size: 13px;
      color: #666;
      font-weight: 600;
      text-align: left;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9fbff; }
    tbody td {
      padding: 12px 16px;
      font-size: 13px;
      color: #333;
      vertical-align: top;
    }
    td.idx { color: #aaa; width: 48px; }
    td.domain-col { white-space: nowrap; }
    .domain-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .tag-blue   { background: #e8f0fe; color: #1b3a6e; }
    .tag-green  { background: #e6f9f0; color: #1a7a4a; }
    .tag-orange { background: #fff3e0; color: #bf6000; }
    .tag-red    { background: #ffeaea; color: #c62828; }
    .tag-purple { background: #f3e8fd; color: #7b2fbe; }
    .tag-teal   { background: #e0f7f5; color: #00796b; }
    .tag-gray   { background: #f0f0f0; color: #666; }

    td.time-col { color: #888; white-space: nowrap; }
    td.content-col {
      max-width: 320px;
      line-height: 1.6;
      color: #444;
    }
    .content-abbr {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 14px 18px;
      gap: 6px;
      border-top: 1px solid #f0f0f0;
    }
    .page-info { font-size: 13px; color: #888; margin-right: 8px; }
    .pg-btn {
      height: 30px;
      min-width: 30px;
      padding: 0 8px;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      background: white;
      font-size: 13px;
      color: #333;
      cursor: pointer;
    }
    .pg-btn.active { background: #1b3a6e; color: white; border-color: #1b3a6e; }
    .pg-btn:hover:not(.active) { border-color: #4361EE; color: #4361EE; }
  </style>
</head>
<body>

<!-- Top Nav -->
<div class="topnav">
  <div class="view-toggle">
    <a class="vt-btn" href="index.html">移动端</a>
    <a class="vt-btn active" href="console.html">控制台</a>
  </div>
  <div class="nav-logo">宜兴智慧健康平台 — 管理后台</div>
  <div class="nav-spacer"></div>
  <div class="nav-user">
    <div class="nav-avatar">管</div>
    管理员
  </div>
</div>

<div class="page">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <div class="page-title">体检反馈管理</div>
      <div class="page-subtitle">查看与统计居民体检反馈数据</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">总反馈数</div>
      <div class="stat-value">128<span>条</span></div>
      <div class="stat-trend">↑ 较上周 +12</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本月新增</div>
      <div class="stat-value">34<span>条</span></div>
      <div class="stat-trend">↑ 较上月 +8</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">待处理</div>
      <div class="stat-value">15<span>条</span></div>
      <div class="stat-trend down">↑ 较昨日 +3</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">匿名反馈</div>
      <div class="stat-value">47<span>条</span></div>
      <div class="stat-trend">占比 36.7%</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <div class="filter-item">
      <span class="filter-label">体检机构</span>
      <select class="filter-select" id="f-hospital">
        <option value="">全部机构</option>
        <option>宜兴市人民医院</option>
        <option>宜兴市中医院</option>
        <option>宜兴市第二人民医院</option>
      </select>
    </div>
    <div class="filter-item">
      <span class="filter-label">时间范围</span>
      <div class="filter-date-range">
        <input type="date" class="filter-input" id="f-date-start" value="2026-04-01">
        <span class="date-sep">至</span>
        <input type="date" class="filter-input" id="f-date-end" value="2026-04-20">
      </div>
    </div>
    <div class="filter-item">
      <span class="filter-label">体检领域</span>
      <select class="filter-select" id="f-domain">
        <option value="">全部领域</option>
        <option>制度机制</option>
        <option>设施布局</option>
        <option>办事流程</option>
        <option>服务态度</option>
        <option>信息公开</option>
        <option>数字化服务</option>
        <option>其他</option>
      </select>
    </div>
    <button class="filter-btn" onclick="applyFilter()">查询</button>
    <button class="filter-reset" onclick="resetFilter()">重置</button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-card-header">
      <span class="table-card-title">反馈列表</span>
      <span class="table-total">共 <em id="total-count">12</em> 条记录</span>
    </div>
    <table id="feedback-table">
      <thead>
        <tr>
          <th>序号</th>
          <th>体检机构</th>
          <th>领域</th>
          <th>反馈时间</th>
          <th>反馈内容</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="pagination">
      <span class="page-info">共 12 条 / 每页 10 条</span>
      <button class="pg-btn active">1</button>
      <button class="pg-btn">2</button>
      <button class="pg-btn">›</button>
    </div>
  </div>

</div>

<script>
const DOMAIN_TAGS = {
  '制度机制': 'tag-blue',
  '设施布局': 'tag-teal',
  '办事流程': 'tag-green',
  '服务态度': 'tag-orange',
  '信息公开': 'tag-purple',
  '数字化服务': 'tag-red',
  '其他': 'tag-gray',
};

const ALL_DATA = [
  { hospital:'宜兴市人民医院', domain:'服务态度', time:'2026-04-20 09:12:35', content:'体检当天排队等候时间较长，窗口工作人员态度较冷漠，希望能改善服务质量。' },
  { hospital:'宜兴市中医院', domain:'办事流程', time:'2026-04-19 14:23:07', content:'体检报告领取流程不清晰，到处询问才找到取报告的地方，建议增加指引标识。' },
  { hospital:'宜兴市人民医院', domain:'设施布局', time:'2026-04-19 10:45:18', content:'体检中心卫生间数量不足，高峰期等候时间长，希望增加卫生间数量或错峰安排。' },
  { hospital:'宜兴市第二人民医院', domain:'数字化服务', time:'2026-04-18 16:08:52', content:'手机预约体检时APP经常闪退，操作不流畅，建议优化小程序性能。' },
  { hospital:'宜兴市人民医院', domain:'制度机制', time:'2026-04-18 11:31:29', content:'体检套餐价格与官网介绍不符，现场补缴了差价，希望价格透明统一。' },
  { hospital:'宜兴市中医院', domain:'信息公开', time:'2026-04-17 09:58:44', content:'体检项目说明不够详细，不清楚各项检查的目的和注意事项，建议提供更详细的科普材料。' },
  { hospital:'宜兴市人民医院', domain:'服务态度', time:'2026-04-17 08:22:13', content:'B超室工作人员非常耐心，解释清晰，整体体验很好，给予表扬。' },
  { hospital:'宜兴市第二人民医院', domain:'办事流程', time:'2026-04-16 15:44:30', content:'抽血后需要自己去多个窗口领结果，建议统一汇总后一次性通知领取。' },
  { hospital:'宜兴市人民医院', domain:'设施布局', time:'2026-04-15 13:20:05', content:'体检1楼候诊区座位不够，很多人站着等候，希望增加座位。' },
  { hospital:'宜兴市中医院', domain:'其他', time:'2026-04-14 10:15:38', content:'体检报告出来的时间比承诺的晚了两天，影响了工作安排，希望能按时出结果。' },
  { hospital:'宜兴市人民医院', domain:'数字化服务', time:'2026-04-13 09:05:22', content:'希望能在网上直接查看体检报告，现在只能去医院现场领取，不方便。' },
  { hospital:'宜兴市第二人民医院', domain:'制度机制', time:'2026-04-12 14:37:50', content:'老年人免费体检项目宣传不到位，很多老人不知道可以免费体检，建议加强宣传。' },
];

let filtered = [...ALL_DATA];

function renderTable(data) {
  const tbody = document.getElementById('table-body');
  document.getElementById('total-count').textContent = data.length;
  tbody.innerHTML = data.map((row, i) => `
    <tr>
      <td class="idx">${i + 1}</td>
      <td>${row.hospital}</td>
      <td class="domain-col"><span class="domain-tag ${DOMAIN_TAGS[row.domain] || 'tag-gray'}">${row.domain}</span></td>
      <td class="time-col">${row.time}</td>
      <td class="content-col"><div class="content-abbr">${row.content}</div></td>
    </tr>
  `).join('');
}

function applyFilter() {
  const hospital = document.getElementById('f-hospital').value;
  const domain = document.getElementById('f-domain').value;
  const start = document.getElementById('f-date-start').value;
  const end = document.getElementById('f-date-end').value;

  filtered = ALL_DATA.filter(row => {
    if (hospital && row.hospital !== hospital) return false;
    if (domain && row.domain !== domain) return false;
    const rowDate = row.time.slice(0, 10);
    if (start && rowDate < start) return false;
    if (end && rowDate > end) return false;
    return true;
  });
  renderTable(filtered);
}

function resetFilter() {
  document.getElementById('f-hospital').value = '';
  document.getElementById('f-domain').value = '';
  document.getElementById('f-date-start').value = '2026-04-01';
  document.getElementById('f-date-end').value = '2026-04-20';
  filtered = [...ALL_DATA];
  renderTable(filtered);
}

renderTable(ALL_DATA);
</script>

</body>
</html>
